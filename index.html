 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assembly News Pro | Bulletproof Edition</title>
    
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-light);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background: linear-gradient(to bottom, rgba(30, 41, 59, 0.8), transparent);
            border-bottom: 1px solid var(--border);
        }

        header h1 { 
            font-size: 2.2rem; 
            font-weight: 800;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        header h1 i { color: var(--primary); }
        #current-date { color: var(--text-muted); font-size: 1.1rem; font-weight: 500; }

        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; color: white; }
        .card-subtitle { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem; }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 2rem;
        }

        .checkbox-card {
            display: flex;
            align-items: center;
            padding: 14px;
            background: rgba(15, 23, 42, 0.5);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--text-muted);
        }

        .checkbox-card i { margin-right: 12px; font-size: 1.2rem; }
        .checkbox-card input { display: none; }

        .checkbox-card:has(input:checked) {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }
        .checkbox-card:has(input:checked) i { color: var(--primary); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            gap: 10px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: white; }
        .btn-outline:hover { background: var(--border); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border-color: var(--error); color: #fca5a5; }
        .btn-danger:hover { background: var(--error); color: white; }

        #loading-screen, #news-screen { display: none; }

        /* --- MASSIVE REAL-TIME LOADER --- */
        .loader-container {
            text-align: center;
            padding: 5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-text-massive {
            font-size: 5rem;
            font-weight: 800;
            color: white;
            line-height: 1;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }

        .progress-bar-wrapper {
            width: 100%;
            max-width: 450px;
            height: 24px;
            background-color: var(--bg-dark);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--border);
            margin-bottom: 20px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 20px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.3);
        }

        .loading-status {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .toolbar { display: flex; flex-direction: column; gap: 12px; margin-bottom: 2rem; }
        .toolbar-group { display: flex; gap: 12px; width: 100%; }
        .toolbar .btn { width: 100%; padding: 12px; font-size: 1rem; }

        .category-header {
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 1.5rem;
            padding-bottom: 15px; border-bottom: 1px solid var(--border);
        }

        .category-title {
            font-size: 1.3rem; font-weight: 800; color: white;
            text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 10px;
        }

        .read-btn {
            background: rgba(255, 255, 255, 0.1); color: white;
            border: 1px solid var(--border); padding: 8px 16px;
            border-radius: 20px; font-weight: 600; font-size: 0.9rem;
            cursor: pointer; display: inline-flex; align-items: center;
            gap: 8px; transition: 0.2s; align-self: flex-start;
        }
        .read-btn:hover { background: var(--primary); border-color: var(--primary); }

        .news-item {
            margin-bottom: 1.5rem; padding: 1.2rem;
            background: rgba(15, 23, 42, 0.4); border-radius: 10px;
            border-left: 4px solid var(--primary);
        }
        .news-item:last-child { margin-bottom: 0; }
        .news-item h3 { font-size: 1.15rem; color: var(--text-light); font-weight: 500; line-height: 1.5; }

        @media (min-width: 600px) {
            .toolbar { flex-direction: row; justify-content: space-between; }
            .toolbar .btn { width: auto; }
            .toolbar-group { width: auto; }
            .category-header { flex-direction: row; justify-content: space-between; align-items: center; }
            .read-btn { align-self: center; }
        }

        /* --- BULLETPROOF MOBILE PRINT MODE --- */
        @media print {
            @page { margin: 1cm; }
            
            /* Force all text to black and remove dark backgrounds to prevent invisible text */
            * {
                color: #000000 !important;
                background: transparent !important;
                box-shadow: none !important;
                text-shadow: none !important;
            }

            /* Remove restrictive heights that cause blank pages on mobile */
            body, html { 
                background-color: #ffffff !important; 
                height: auto !important; 
                min-height: auto !important; 
                overflow: visible !important; 
            }

            .container { 
                padding: 0 !important; 
                max-width: 100% !important; 
                margin: 0 !important;
            }

            /* Hide everything except the news content */
            #setup-screen, #loading-screen, .toolbar, .read-btn, .checkbox-grid, .card-subtitle { 
                display: none !important; 
            }
            
            #news-screen, #assembly-content {
                display: block !important;
            }

            /* Clean formatting for the paper/PDF */
            header { 
                padding: 0 0 1rem 0 !important; 
                border-bottom: 2px solid #000 !important; 
                page-break-after: avoid;
            }

            .card { 
                border: none !important; 
                padding: 0 !important; 
                margin-bottom: 2rem !important; 
                page-break-inside: avoid;
            }

            .category-header { 
                border-bottom: 2px solid #ccc !important; 
                padding-bottom: 0.5rem !important;
                margin-bottom: 1rem !important;
                page-break-after: avoid;
            }

            .category-title {
                font-size: 1.4rem !important;
            }

            .news-item { 
                border-left: none !important; 
                padding: 0 0 0.5rem 0 !important; 
                margin-bottom: 1rem !important; 
                border-bottom: 1px dashed #ccc !important; 
                page-break-inside: avoid;
            }

            .news-item h3 { 
                font-size: 1.1rem !important; 
            }

            /* Add bullet points back in specifically for print */
            .news-item h3::before { 
                content: "• "; 
                font-weight: bold; 
            }
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-microphone-lines"></i> Assembly News</h1>
        <div id="current-date"></div>
    </header>

    <div class="container">
        <div id="setup-screen" class="card">
            <h2 class="card-title">Select Today's Topics</h2>
            <p class="card-subtitle">Choose the categories you want to include in today's assembly.</p>
            
            <div class="checkbox-grid">
                <label class="checkbox-card"><input type="checkbox" value="international"><i class="fa-solid fa-earth-americas"></i> World</label>
                <label class="checkbox-card"><input type="checkbox" value="national" checked><i class="fa-solid fa-flag-in"></i> National</label>
                <label class="checkbox-card"><input type="checkbox" value="state" checked><i class="fa-solid fa-map-location-dot"></i> State News</label>
                <label class="checkbox-card"><input type="checkbox" value="sports" checked><i class="fa-solid fa-trophy"></i> Sports</label>
                <label class="checkbox-card"><input type="checkbox" value="technology"><i class="fa-solid fa-microchip"></i> Sci & Tech</label>
                <label class="checkbox-card"><input type="checkbox" value="education"><i class="fa-solid fa-graduation-cap"></i> Education</label>
            </div>

            <button class="btn" onclick="startGeneration()">
                Generate Script <i class="fa-solid fa-bolt"></i>
            </button>
        </div>

        <div id="loading-screen" class="card loader-container">
            <div class="progress-text-massive" id="progress-number">0%</div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="loading-status" id="loading-message">Connecting to Servers...</div>
        </div>

        <div id="news-screen">
            <div class="toolbar">
                <button class="btn btn-outline" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i> Back</button>
                <div class="toolbar-group">
                    <button class="btn btn-danger" onclick="stopSpeaking()" id="stop-btn" style="display:none;">
                        <i class="fa-solid fa-stop"></i> Stop Audio
                    </button>
                    <button class="btn btn-outline" onclick="window.print()"><i class="fa-solid fa-print"></i> Print Script</button>
                </div>
            </div>
            
            <div id="assembly-content"></div>
        </div>
    </div>

    <script>
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-IN', dateOptions);

        const feeds = {
            international: { title: "International Updates", icon: "fa-earth-americas", url: "https://feeds.feedburner.com/ndtvnews-world-news" },
            national: { title: "National News", icon: "fa-flag-in", url: "https://feeds.feedburner.com/ndtvnews-india-news" },
            state: { title: "State Highlights", icon: "fa-map-location-dot", url: "https://www.thehindu.com/news/national/karnataka/feeder/default.rss" },
            sports: { title: "Sports Arena", icon: "fa-trophy", url: "https://feeds.feedburner.com/ndtvsports-latest" },
            technology: { title: "Science & Tech", icon: "fa-microchip", url: "https://feeds.feedburner.com/gadgets360-latest" },
            education: { title: "Education News", icon: "fa-graduation-cap", url: "https://www.thehindu.com/education/feeder/default.rss" }
        };

        const setupScreen = document.getElementById('setup-screen');
        const loadingScreen = document.getElementById('loading-screen');
        const newsScreen = document.getElementById('news-screen');
        const contentDiv = document.getElementById('assembly-content');
        
        const progressNumber = document.getElementById('progress-number');
        const progressFill = document.getElementById('progress-fill');
        const loadingMessage = document.getElementById('loading-message');

        function cleanTitle(title) {
            return title.replace(/<!\[CDATA\[(.*?)\]\]>/g, '$1')
                        .replace(/&quot;/g, '"').replace(/&apos;/g, "'")
                        .replace(/&#8216;/g, "'").replace(/&#8217;/g, "'")
                        .replace(/&#039;/g, "'").trim();
        }

        async function fetchWithMegaFallback(feedUrl) {
            const encodedUrl = encodeURIComponent(feedUrl);
            const endpoints = [
                `https://api.allorigins.win/get?url=${encodedUrl}`,
                `https://api.rss2json.com/v1/api.json?rss_url=${encodedUrl}`,
                `https://corsproxy.io/?${encodedUrl}`
            ];

            for (let i = 0; i < endpoints.length; i++) {
                try {
                    const response = await fetch(endpoints[i], { timeout: 8000 });
                    if (!response.ok) continue;

                    if (i === 0) {
                        const data = await response.json();
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                        const items = Array.from(xmlDoc.querySelectorAll("item")).slice(0, 3);
                        return items.map(item => cleanTitle(item.querySelector("title")?.textContent || ""));
                    } else if (i === 1) {
                        const data = await response.json();
                        if (data.status !== 'ok') continue;
                        return data.items.slice(0, 3).map(item => cleanTitle(item.title));
                    } else if (i === 2) {
                        const text = await response.text();
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(text, "text/xml");
                        const items = Array.from(xmlDoc.querySelectorAll("item")).slice(0, 3);
                        return items.map(item => cleanTitle(item.querySelector("title")?.textContent || ""));
                    }
                } catch (err) {
                    console.warn(`Fallback ${i+1} failed, trying next...`);
                }
            }
            return null;
        }

        function updateProgressUI(percentage) {
            progressNumber.innerText = `${Math.floor(percentage)}%`;
            progressFill.style.width = `${percentage}%`;
        }

        async function startGeneration() {
            const checkboxes = document.querySelectorAll('#setup-screen input[type="checkbox"]:checked');
            const selectedCategories = Array.from(checkboxes).map(cb => cb.value);

            if (selectedCategories.length === 0) {
                alert("Please select at least one topic.");
                return;
            }

            setupScreen.style.display = 'none';
            loadingScreen.style.display = 'flex';
            updateProgressUI(0);
            
            window.speechData = {}; 
            let finalHTML = '';
            
            let currentProg = 5;
            updateProgressUI(currentProg);
            const progressPerStep = 90 / selectedCategories.length;

            for (const category of selectedCategories) {
                loadingMessage.innerText = `Fetching ${feeds[category].title}...`;
                
                const titles = await fetchWithMegaFallback(feeds[category].url);
                
                currentProg += progressPerStep;
                updateProgressUI(currentProg);

                if (titles && titles.length > 0) {
                    window.speechData[category] = titles;
                    
                    finalHTML += `<div class="card">`;
                    finalHTML += `
                        <div class="category-header">
                            <div class="category-title"><i class="fa-solid ${feeds[category].icon}"></i> ${feeds[category].title}</div>
                            <button class="read-btn" onclick="readAloud('${category}')"><i class="fa-solid fa-volume-high"></i> Listen</button>
                        </div>
                    `;
                    titles.forEach(title => {
                        finalHTML += `<div class="news-item"><h3>${title}</h3></div>`;
                    });
                    finalHTML += `</div>`;
                } else {
                    finalHTML += `
                        <div class="card" style="border-left: 4px solid var(--warning);">
                            <div class="category-title" style="color: var(--warning); margin-bottom:10px;"><i class="fa-solid ${feeds[category].icon}"></i> ${feeds[category].title}</div>
                            <p style="color: var(--warning);">⚠️ Temporarily unavailable.</p>
                        </div>
                    `;
                }
            }

            loadingMessage.innerText = "Finalizing Layout...";
            updateProgressUI(100);

            setTimeout(() => {
                contentDiv.innerHTML = finalHTML;
                loadingScreen.style.display = 'none';
                newsScreen.style.display = 'block';
            }, 600);
        }

        function readAloud(category) {
            if (!window.speechSynthesis) return alert("Browser does not support text-to-speech.");
            
            stopSpeaking();
            document.getElementById('stop-btn').style.display = 'inline-flex';
            
            const lines = window.speechData[category];
            const intro = new SpeechSynthesisUtterance(`Here are the updates for ${feeds[category].title}.`);
            intro.rate = 0.95;
            window.speechSynthesis.speak(intro);

            lines.forEach((line) => {
                const utterance = new SpeechSynthesisUtterance(line);
                utterance.rate = 0.9; 
                utterance.onend = () => {
                    if(!window.speechSynthesis.speaking) document.getElementById('stop-btn').style.display = 'none';
                };
                window.speechSynthesis.speak(utterance);
            });
        }

        function stopSpeaking() {
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                document.getElementById('stop-btn').style.display = 'none';
            }
        }

        function goBack() {
            stopSpeaking();
            newsScreen.style.display = 'none';
            setupScreen.style.display = 'block';
        }
    </script>
</body>
</html>
